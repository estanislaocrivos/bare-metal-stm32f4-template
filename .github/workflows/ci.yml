name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --std=c11 \
            -I include \
            -i external/ \
            -i build/ \
            -i test/ \
            src/

  build:
    name: Build (arm-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi gdb-multiarch cmake

      - name: Configure
        run: |
          cmake -B build/ \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DMCU=STM32F401xE \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build/ -- -j$(nproc)

      - name: Show memory usage
        run: arm-none-eabi-size build/bare-metal-stm32f4.elf

  test:
    name: Unit Tests (Ceedling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Ceedling
        run: gem install ceedling -v 1.0.1

      - name: Run tests
        run: ceedling test:all
